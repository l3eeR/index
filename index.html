<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เครื่องคิดเปอร์เซ็นต์ PRO v4</title>
  <style>
    :root {
      --primary: #4a7cff;
      --primary-dark: #3a6ae8;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #fd7e14;
      --bg: #f0f2f5;
      --card-bg: #ffffff;
      --text: #333;
      --muted: #6c757d;
      --border: #dee2e6;
      --radius: 12px;
    }

    /* ===== Dark Mode ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e;
        --card-bg: #16213e;
        --text: #e0e0e0;
        --muted: #a0a0b0;
        --border: #2e3a5c;
      }
      input, select { background: #0f3460; color: var(--text); }
      .result-box { background: #0f3460; border-color: #2e3a5c; }
      .history-item { background: #0f3460; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      padding: 28px 24px;
      border-radius: 20px;
      width: 100%;
      max-width: 430px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12);
    }

    h2 {
      text-align: center;
      color: var(--text);
      font-size: 20px;
      margin-bottom: 22px;
    }

    .input-group { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74,124,255,0.15);
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ===== Button ===== */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      font-size: 13px;
      padding: 8px;
      margin-top: 8px;
    }

    /* ===== Loading Spinner ===== */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Toast Notification ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #toast.success { background: var(--success); }
    #toast.error { background: var(--danger); }

    /* ===== Result Box ===== */
    .result-box {
      margin-top: 20px;
      padding: 16px;
      background: #f8f9ff;
      border-radius: var(--radius);
      border: 1.5px solid #e0e8ff;
      font-size: 14px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
    }
    .result-row + .result-row { border-top: 1px dashed var(--border); }
    .result-label { color: var(--muted); }
    .result-value { font-weight: 700; font-size: 15px; }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--success); }
    .text-warning { color: var(--warning); }
    .text-primary { color: var(--primary); }

    .summary-line {
      background: linear-gradient(135deg, #4a7cff, #6a9cff);
      color: white;
      padding: 14px;
      border-radius: var(--radius);
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    /* ===== History Section ===== */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 24px;
      margin-bottom: 10px;
    }
    .history-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .history-clear {
      font-size: 12px;
      color: var(--danger);
      cursor: pointer;
      background: none;
      border: none;
      font-weight: 600;
    }

    .history-list { max-height: 200px; overflow-y: auto; }
    .history-item {
      background: #f8f9ff;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:hover { background: #e8f0ff; }
    .history-item .h-amount { font-weight: 700; color: var(--text); }
    .history-item .h-net { color: var(--success); font-weight: 600; }
    .history-item .h-time { color: var(--muted); font-size: 11px; }

    /* ===== Status Badge ===== */
    .status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 6px;
    }
    .badge-online { background: #d4edda; color: #155724; }
    .badge-offline { background: #f8d7da; color: #721c24; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  </style>
</head>
<body>

<div class="card">
  <h2>
    📊 คิดเปอร์เซ็นต์ PRO
    <span id="statusBadge" class="status-badge badge-offline">ออฟไลน์</span>
  </h2>

  <!-- ===== ช่องกรอกยอดเงิน ===== -->
  <div class="input-group">
    <label>ยอดเงิน (รองรับสูตร เช่น 1000+702)</label>
    <input id="amount" type="text" placeholder="0.00" autocomplete="off" inputmode="decimal">
  </div>

  <!-- ===== เลือกประเภทรายการ ===== -->
  <div class="input-group">
    <label>ประเภทรายการ</label>
    <select id="typeSelect" onchange="applyConfig()">
      <option value="">-- กำหนดเอง --</option>
    </select>
  </div>

  <!-- ===== % หักออก และ % รับคืน ===== -->
  <div class="grid-2">
    <div class="input-group">
      <label>หักออก (%)</label>
      <input id="percent" type="number" value="0" min="0" max="100" step="0.01">
    </div>
    <div class="input-group">
      <label>รับคืน (%)</label>
      <input id="receivePercent" type="number" value="0" min="0" max="100" step="0.01">
    </div>
  </div>

  <!-- ===== % รอโอน ===== -->
  <div class="input-group">
    <label>% รอร้านโอนกลับ</label>
    <input id="pendingPercent" type="number" value="0" min="0" max="100" step="0.01">
  </div>

  <!-- ===== ปุ่มคำนวณ ===== -->
  <button class="btn btn-primary" id="calcBtn" onclick="calculate()">
    คำนวณและบันทึก
  </button>
  <button class="btn btn-secondary" onclick="resetForm()">ล้างข้อมูล</button>

  <!-- ===== กล่องแสดงผล ===== -->
  <div id="resultBox" class="result-box" style="display:none;"></div>

  <!-- ===== ประวัติการคำนวณ ===== -->
  <div id="historySection" style="display:none;">
    <hr class="divider">
    <div class="history-header">
      <span class="history-title">ประวัติการคำนวณ</span>
      <button class="history-clear" onclick="clearHistory()">ล้างประวัติ</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<!-- Toast Notification -->
<div id="toast"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";
  let configData = [];
  const HISTORY_KEY = "calc_history_v2";

  // ===== โหลด Config จาก API =====
  window.addEventListener("DOMContentLoaded", async () => {
    renderHistory();
    await loadConfig();
    // รองรับการกด Enter เพื่อคำนวณ
    document.getElementById("amount").addEventListener("keydown", e => {
      if (e.key === "Enter") calculate();
    });
  });

  async function loadConfig() {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000); // Timeout 8 วินาที

      const res = await fetch(API_URL, { signal: controller.signal });
      clearTimeout(timeout);

      const json = await res.json();

      // รองรับทั้ง response แบบเก่า (array) และแบบใหม่ ({ status, data })
      const items = Array.isArray(json) ? json : (json.data || []);

      configData = items;
      const select = document.getElementById("typeSelect");

      // ล้าง option เก่าก่อน (ยกเว้น option แรก)
      while (select.options.length > 1) select.remove(1);

      configData.forEach((item, index) => {
        const opt = new Option(`${item.name} (หัก ${item.percent}%)`, index);
        select.add(opt);
      });

      setStatus(true);
    } catch (err) {
      console.warn("โหลด Config ไม่สำเร็จ:", err.name === "AbortError" ? "Timeout" : err.message);
      setStatus(false);
      showToast("ไม่สามารถโหลดประเภทรายการได้", "error");
    }
  }

  function setStatus(online) {
    const badge = document.getElementById("statusBadge");
    badge.textContent = online ? "ออนไลน์" : "ออฟไลน์";
    badge.className = `status-badge ${online ? "badge-online" : "badge-offline"}`;
  }

  function applyConfig() {
    const idx = document.getElementById("typeSelect").value;
    if (idx !== "") {
      const item = configData[parseInt(idx)];
      if (item) {
        document.getElementById("percent").value = item.percent;
        document.getElementById("receivePercent").value = item.receive;
      }
    }
  }

  // ===== ฟังก์ชันคำนวณหลัก =====
  async function calculate() {
    const amountStr = document.getElementById("amount").value.trim();
    if (!amountStr) {
      showToast("กรุณากรอกยอดเงิน", "error");
      document.getElementById("amount").focus();
      return;
    }

    const p  = parseFloat(document.getElementById("percent").value) || 0;
    const rp = parseFloat(document.getElementById("receivePercent").value) || 0;
    const pp = parseFloat(document.getElementById("pendingPercent").value) || 0;

    let amount;
    try {
      // ใช้ Function constructor เพื่อรองรับสูตรคณิตศาสตร์ เช่น 1000+702
      // ป้องกัน XSS เบื้องต้น: อนุญาตเฉพาะตัวเลขและตัวดำเนินการทางคณิตศาสตร์
      if (!/^[\d\s\+\-\*\/\.\(\)]+$/.test(amountStr)) {
        throw new Error("ตัวอักษรไม่ถูกต้อง");
      }
      amount = Function('"use strict"; return (' + amountStr + ')')();
      if (typeof amount !== "number" || isNaN(amount) || !isFinite(amount) || amount < 0) {
        throw new Error("ผลลัพธ์ไม่ถูกต้อง");
      }
    } catch (err) {
      showToast("กรุณากรอกตัวเลขหรือสูตรให้ถูกต้อง", "error");
      return;
    }

    // ===== คำนวณ =====
    const discount       = (amount * p)  / 100;
    const netAfterDisc   = amount - discount;
    const receiveAmt     = (amount * rp) / 100;
    const pendingNet     = amount - (amount * pp / 100);

    // ===== แสดงผล =====
    const resBox = document.getElementById("resultBox");
    resBox.style.display = "block";
    resBox.innerHTML = `
      <div class="result-row">
        <span class="result-label">ยอดรวม</span>
        <span class="result-value text-primary">${fmt(amount)}</span>
      </div>
      <div class="result-row">
        <span class="result-label">หัก ${p}%</span>
        <span class="result-value text-danger">-${fmt(discount)}</span>
      </div>
      <div class="result-row">
        <span class="result-label">รับคืน ${rp}%</span>
        <span class="result-value text-success">+${fmt(receiveAmt)}</span>
      </div>
      <div class="result-row">
        <span class="result-label">ยอดหลังหักรอโอน (${pp}%)</span>
        <span class="result-value text-warning">${fmt(pendingNet)}</span>
      </div>
      <div class="summary-line">
        ${fmt(amount)} − ${p}% = ${fmt(netAfterDisc)}
      </div>
    `;

    // ===== บันทึกประวัติ (Local) =====
    saveHistory({ amount, p, rp, pp, netAfterDisc, pendingNet, receiveAmt });

    // ===== ส่งข้อมูลไปยัง API =====
    await sendToAPI({ amount, percent: p, receivePercent: rp, pendingPercent: pp,
                      final: netAfterDisc, pendingNet, receiveAmount: receiveAmt });
  }

  // ===== ส่งข้อมูลไป Google Sheets =====
  async function sendToAPI(payload) {
    const btn = document.getElementById("calcBtn");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...';

    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      showToast("บันทึกสำเร็จ ✓", "success");
    } catch (err) {
      console.error("sendToAPI Error:", err);
      showToast("บันทึกไม่สำเร็จ (ตรวจสอบการเชื่อมต่อ)", "error");
    } finally {
      btn.disabled = false;
      btn.innerHTML = "คำนวณและบันทึก";
    }
  }

  // ===== ล้างฟอร์ม =====
  function resetForm() {
    document.getElementById("amount").value = "";
    document.getElementById("percent").value = "0";
    document.getElementById("receivePercent").value = "0";
    document.getElementById("pendingPercent").value = "0";
    document.getElementById("typeSelect").value = "";
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("amount").focus();
  }

  // ===== ประวัติการคำนวณ (LocalStorage) =====
  function saveHistory(entry) {
    let history = getHistory();
    history.unshift({ ...entry, time: new Date().toISOString() });
    if (history.length > 20) history = history.slice(0, 20); // เก็บสูงสุด 20 รายการ
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function getHistory() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
    } catch { return []; }
  }

  function clearHistory() {
    if (confirm("ต้องการล้างประวัติทั้งหมดใช่ไหม?")) {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }
  }

  function renderHistory() {
    const history = getHistory();
    const section = document.getElementById("historySection");
    const list = document.getElementById("historyList");

    if (history.length === 0) {
      section.style.display = "none";
      return;
    }

    section.style.display = "block";
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="restoreHistory(${i})" title="คลิกเพื่อกรอกข้อมูลซ้ำ">
        <div>
          <div class="h-amount">${fmt(h.amount)} <span style="font-weight:400;color:var(--muted)">หัก ${h.p}%</span></div>
          <div class="h-time">${formatTime(h.time)}</div>
        </div>
        <div class="h-net">${fmt(h.netAfterDisc)}</div>
      </div>
    `).join("");
  }

  function restoreHistory(index) {
    const h = getHistory()[index];
    if (!h) return;
    document.getElementById("amount").value = h.amount;
    document.getElementById("percent").value = h.p;
    document.getElementById("receivePercent").value = h.rp;
    document.getElementById("pendingPercent").value = h.pp;
    document.getElementById("typeSelect").value = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // ===== Utility Functions =====
  function fmt(n) {
    return Number(n).toLocaleString("th-TH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function formatTime(iso) {
    try {
      const d = new Date(iso);
      return d.toLocaleString("th-TH", { dateStyle: "short", timeStyle: "short" });
    } catch { return ""; }
  }

  function showToast(msg, type = "") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = `show ${type}`;
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.className = ""; }, 3000);
  }
</script>
</body>
</html>
