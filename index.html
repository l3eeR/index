<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคิดเงิน & บันทึกกำไร</title>
  <style>
    :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f8f9fa; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 15px; margin: 0; display: flex; justify-content: center; }
    .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #666; }
    input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-main { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; background: var(--accent); color: white; transition: 0.2s; margin-bottom: 15px; }
    .result-section { background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px solid #f0f0f0; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
    .row b { color: var(--danger); }
    .profit-box { text-align: center; margin: 10px 0; padding: 12px; background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; }
    .profit-value { font-size: 28px; color: #1e8449; font-weight: bold; display: block; }
    .copy-area { display: flex; align-items: center; background: #eef7ff; padding: 10px; border-radius: 10px; margin-top: 10px; }
    #copyTarget { flex: 1; font-weight: bold; color: var(--accent); text-align: center; }
    .btn-copy { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .percent-badge { background: #fff9db; padding: 5px 10px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 13px; }
  </style>
</head>
<body>

<div class="card">
  <h2>🏢 ระบบคิดเงิน & บันทึกกำไร</h2>
  
  <label>ยอดเงินต้น (รองรับ 1000+180)</label>
  <input type="text" id="amount" placeholder="0" inputmode="decimal">

  <div class="grid">
    <div>
      <label>หักลูกค้า (%)</label>
      <input type="number" id="p_cust" value="25">
    </div>
    <div>
      <label>ร้านหักเรา (%)</label>
      <input type="number" id="p_shop" value="15">
    </div>
  </div>

  <button class="btn-main" id="saveBtn" onclick="calculateAndSave()">คำนวณและบันทึก</button>

  <div class="result-section">
    <div class="row"><span>หักลูกค้า:</span> <span id="v_cust_val">0</span></div>
    <div class="row"><span>ร้านหักเรา:</span> <span id="v_shop_val">0</span></div>
    
    <div class="percent-badge">
      <span>เปอร์เซ็นต์ที่เราได้:</span>
      <b id="v_my_percent" style="color:var(--success)">0%</b>
    </div>

    <div class="profit-box">
      <span style="font-size: 12px; color: #27ae60; font-weight: bold;">กำไรสุทธิที่เราได้จริง</span>
      <span class="profit-value" id="v_my_profit">0 บาท</span>
    </div>

    <div class="copy-area">
      <span id="copyTarget">---</span>
      <button class="btn-copy" onclick="copyResult()">คัดลอก</button>
    </div>
  </div>
</div>

<script>
  // วาง URL ของคุณที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";

  function calculateAndSave() {
    const btn = document.getElementById('saveBtn');
    const rawInput = document.getElementById('amount').value;

    try {
      let amt = eval(rawInput.replace(/[^0-9+\-*/.]/g, ''));
      let pCust = Number(document.getElementById('p_cust').value);
      let pShop = Number(document.getElementById('p_shop').value);

      let valCustDeduct = Math.round(amt * (pCust / 100));
      let toCustomer = amt - valCustDeduct;
      let pProfit = pCust - pShop;
      let valProfit = Math.round(amt * (pProfit / 100));

      // --- ส่วนที่ปรับปรุงใหม่ ---
      // ถ้า pShop (ร้านหัก) เป็น 0 ให้ยอดหลังรอโอนเป็น 0 
      // แต่ถ้ามีการหัก ให้คำนวณยอดเงินที่ต้องรอโอนกลับ
      let valAfterWait = (pShop === 0) ? 0 : Math.round(amt * (1 - pShop/100));
      // -----------------------

      // อัปเดต UI หน้าจอ
      document.getElementById('v_cust_val').innerHTML = `<b>-${valCustDeduct.toLocaleString()} (${pCust}%)</b>`;
      document.getElementById('v_shop_val').innerText = pShop + "%";
      document.getElementById('v_my_percent').innerText = pProfit + "%";
      document.getElementById('v_my_profit').innerText = valProfit.toLocaleString() + " บาท";
      
      const copyStr = `${amt}-${pCust}%=${toCustomer}`;
      document.getElementById('copyTarget').innerText = copyStr;

      btn.disabled = true;
      btn.innerText = "กำลังบันทึก...";

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          amount: amt,
          customerDeduct: pCust,
          myPercent: pProfit,
          shopWaitPercent: pShop,
          afterDeduct: toCustomer,
          afterWait: valAfterWait, // ส่งค่า 0 ไปบันทึกถ้าไม่ได้หัก
          profitAmt: valProfit,
          note: copyStr
        })
      }).then(() => {
        alert("บันทึกข้อมูลเรียบร้อย!");
      }).finally(() => {
        btn.disabled = false;
        btn.innerText = "คำนวณและบันทึก";
      });

    } catch(e) { alert("กรุณาตรวจสอบตัวเลข"); }
  }

  function copyResult() {
    const text = document.getElementById('copyTarget').innerText;
    if(text === "---") return;
    navigator.clipboard.writeText(text);
    alert("คัดลอกแล้ว: " + text);
  }
</script>
</body>
</html>
