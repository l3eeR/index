<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คิดเปอร์เซ็นต์ PRO (FINAL)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #27ae60;
      --warning: #f1c40f;
      --danger: #e74c3c;
      --bg: #f4f7f6;
      --card-bg: #ffffff;
      --text: #333;
      --border: #ddd;
      --online: #28a745;
      --offline: #dc3545;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 15px; line-height: 1.6; }

    .container { max-width: 500px; margin: 20px auto; }
    .card { background: var(--card-bg); padding: 25px; border-radius: 15px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
    
    h2 { text-align: center; margin-bottom: 25px; color: var(--primary); font-size: 24px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 5px; color: white; font-weight: bold; }
    .status-online { background-color: var(--online); }
    .status-offline { background-color: var(--offline); }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #555; }
    input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.3s; }
    input:focus { border-color: var(--accent); }
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 17px; font-weight: bold; cursor: pointer; transition: background-color 0.3s, transform 0.1s; }
    .btn-primary { background: var(--accent); color: white; margin-top: 10px; }
    .btn-primary:hover { background: #2980b9; transform: translateY(-1px); }
    .btn-secondary { background: #ecf0f1; color: var(--primary); margin-top: 10px; }
    .btn-secondary:hover { background: #dde1e2; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .result-box { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 25px; border: 1px solid #e9ecef; }
    .result-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
    .result-item:last-child { border-bottom: none; }
    .result-label { color: #666; }
    .result-value { font-weight: bold; color: var(--primary); }
    .result-value.positive { color: var(--success); }
    .result-value.negative { color: var(--danger); }

    .final-display { background: var(--accent); color: white; padding: 15px; border-radius: 10px; text-align: center; font-size: 20px; font-weight: bold; margin-top: 20px; display: flex; justify-content: space-between; align-items: center; }
    .final-display .copy-btn { background: none; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-left: 10px; }
    .final-display .copy-btn:hover { background: rgba(255,255,255,0.1); }

    .history-section { margin-top: 30px; }
    .history-item { background: #fdfdfd; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer; transition: background-color 0.2s; }
    .history-item:hover { background: #f0f0f0; }
    .history-header { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 5px; }
    .history-details { font-size: 16px; font-weight: bold; color: var(--primary); }
    .history-clear-btn { float: right; background: none; border: none; color: var(--danger); cursor: pointer; font-size: 14px; }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; font-size: 14px; }

    .summary-today { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: center; font-size: 18px; font-weight: bold; color: var(--success); border: 1px solid #c8e6c9; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>คิดเปอร์เซ็นต์ PRO <span id="statusBadge" class="status-badge status-offline">ออฟไลน์</span></h2>

    <div class="form-group">
      <label for="amount">ยอดเงิน (รองรับสูตร เช่น 1000+702)</label>
      <input type="text" id="amount" placeholder="ใส่ยอดเงิน" value="" onkeyup="if(event.keyCode === 13) calculateAndSave()">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label for="deductPercent">หักออก (%)</label>
        <input type="number" id="deductPercent" value="10" min="0" max="100">
      </div>
      <div class="form-group">
        <label for="receivePercent">รับคืน (%)</label>
        <input type="number" id="receivePercent" value="10" min="0" max="100">
      </div>
    </div>

    <div class="form-group">
      <label for="pendingPercent">% รอร้านโอนกลับ</label>
      <input type="number" id="pendingPercent" value="0" min="0" max="100">
    </div>

    <button class="btn btn-primary" id="calculateBtn" onclick="calculateAndSave()">คำนวณและบันทึก</button>
    <button class="btn btn-secondary" onclick="clearForm()">ล้างข้อมูล</button>

    <div class="result-box">
      <div class="result-item">
        <span class="result-label">ยอดรวม</span>
        <span class="result-value" id="totalAmount">0</span>
      </div>
      <div class="result-item">
        <span class="result-label">หัก <span id="deductDisplay">0</span>%</span>
        <span class="result-value negative" id="deductedAmount">0</span>
      </div>
      <div class="result-item">
        <span class="result-label">รับคืน <span id="receiveDisplay">0</span>%</span>
        <span class="result-value positive" id="receivedAmount">0</span>
      </div>
      <div class="result-item">
        <span class="result-label">เราได้วันนี้</span>
        <span class="result-value" id="todayReceived">0</span>
      </div>
      <div class="result-item">
        <span class="result-label">ยอดหลังหักรอโอน (<span id="pendingDisplay">0</span>%)</span>
        <span class="result-value" id="pendingNet">0</span>
      </div>
    </div>

    <div class="final-display">
      <span id="finalResultDisplay">0</span>
      <button class="copy-btn" onclick="copyResult()">คัดลอก</button>
    </div>

    <div class="summary-today">
      เราได้จริงๆวันนี้: <span id="actualReceivedToday">0</span> บาท
    </div>

    <div class="history-section">
      <h3 style="font-size: 18px; margin-bottom: 15px; color: var(--primary);">ประวัติการคำนวณ <button class="history-clear-btn" onclick="clearHistory()">ล้างประวัติ</button></h3>
      <div id="historyList"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  const API_URL = ""; // <<<<<<< ใส่ Web App URL ที่ได้จากการ Deploy ตรงนี้

  document.addEventListener('DOMContentLoaded', () => {
    // loadConfig(); // Removed as per user request
    loadHistory();
    checkApiStatus();
    loadDailySummary(); // Load daily summary on page load
  });

  async function checkApiStatus() {
    const statusBadge = document.getElementById('statusBadge');
    if (!API_URL) {
      statusBadge.textContent = 'ไม่ได้ตั้งค่า API';
      statusBadge.classList.remove('status-online');
      statusBadge.classList.add('status-offline');
      return;
    }
    try {
      const response = await fetch(API_URL + '?action=getSummary', { mode: 'cors' }); // Changed to getSummary to check API
      if (response.ok) {
        statusBadge.textContent = 'ออนไลน์';
        statusBadge.classList.remove('status-offline');
        statusBadge.classList.add('status-online');
      } else {
        statusBadge.textContent = 'ออฟไลน์';
        statusBadge.classList.remove('status-online');
        statusBadge.classList.add('status-offline');
      }
    } catch (error) {
      statusBadge.textContent = 'ออฟไลน์';
      statusBadge.classList.remove('status-online');
      statusBadge.classList.add('status-offline');
    }
  }

  async function calculateAndSave() {
    if (!API_URL) {
      showToast("กรุณาใส่ Web App URL ในไฟล์ HTML ก่อนใช้งานครับ");
      return;
    }

    const amountInput = document.getElementById('amount');
    let amount;
    try {
      // ใช้ eval เพื่อรองรับสูตรคณิตศาสตร์
      amount = Math.round(eval(amountInput.value.replace(/[^0-9+\-*/.]/g, '')));
    } catch (e) {
      showToast("รูปแบบยอดเงินไม่ถูกต้อง");
      return;
    }

    if (isNaN(amount) || amount <= 0) {
      showToast("กรุณาใส่ยอดเงินที่ถูกต้อง");
      return;
    }

    const deductPercent = Number(document.getElementById('deductPercent').value);
    const receivePercent = Number(document.getElementById('receivePercent').value);
    const pendingPercent = Number(document.getElementById('pendingPercent').value);

    if (isNaN(deductPercent) || isNaN(receivePercent) || isNaN(pendingPercent)) {
      showToast("กรุณาใส่เปอร์เซ็นต์ที่ถูกต้อง");
      return;
    }

    const calculateBtn = document.getElementById('calculateBtn');
    calculateBtn.disabled = true;
    calculateBtn.textContent = 'กำลังคำนวณ...';

    // Calculations
    const totalAmount = amount;
    const deductedAmount = Math.round(amount * (deductPercent / 100));
    const receivedAmount = Math.round(amount * (receivePercent / 100));
    const todayReceived = Math.round(totalAmount - deductedAmount + receivedAmount); // เราได้วันนี้
    
    let pendingNet = 0; // Default to 0 if pendingPercent is 0
    if (pendingPercent > 0) {
      pendingNet = Math.round(todayReceived - (amount * (pendingPercent / 100)));
    } 

    // Display results
    document.getElementById('totalAmount').textContent = formatNumber(totalAmount);
    document.getElementById('deductDisplay').textContent = deductPercent;
    document.getElementById('deductedAmount').textContent = formatNumber(deductedAmount);
    document.getElementById('receiveDisplay').textContent = receivePercent;
    document.getElementById('receivedAmount').textContent = formatNumber(receivedAmount);
    document.getElementById('todayReceived').textContent = formatNumber(todayReceived);
    document.getElementById('pendingDisplay').textContent = pendingPercent;
    document.getElementById('pendingNet').textContent = formatNumber(pendingNet);
    document.getElementById('finalResultDisplay').textContent = `${formatNumber(todayReceived)} - ${pendingPercent}% = ${formatNumber(pendingNet)}`;

    // Save to Google Sheet
    try {
      const payload = {
        amount: totalAmount,
        percent: deductPercent,
        receivePercent: receivePercent,
        pendingPercent: pendingPercent,
        final: todayReceived, // ยอดหลังหัก (เราได้วันนี้)
        pendingNet: pendingNet, // ยอดหลังหักรอโอน
        note: "-" // ไม่มีประเภทรายการแล้ว
      };

      const response = await fetch(API_URL, {
        method: "POST",
        mode: "no-cors", 
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      
      showToast("บันทึกสำเร็จ ✓ (ข้อมูลกำลังส่งไปยัง Sheet)");
      saveToHistory(payload, todayReceived, pendingNet);
      loadDailySummary(); // Reload daily summary after saving
    } catch (e) {
      console.error(e);
      showToast("เกิดข้อผิดพลาดในการบันทึก: " + e.message);
    } finally {
      calculateBtn.disabled = false;
      calculateBtn.textContent = 'คำนวณและบันทึก';
    }
  }

  function clearForm() {
    document.getElementById('amount').value = '';
    document.getElementById('deductPercent').value = '10';
    document.getElementById('receivePercent').value = '10';
    document.getElementById('pendingPercent').value = '0';

    document.getElementById('totalAmount').textContent = '0';
    document.getElementById('deductDisplay').textContent = '0';
    document.getElementById('deductedAmount').textContent = '0';
    document.getElementById('receiveDisplay').textContent = '0';
    document.getElementById('receivedAmount').textContent = '0';
    document.getElementById('todayReceived').textContent = '0';
    document.getElementById('pendingDisplay').textContent = '0';
    document.getElementById('pendingNet').textContent = '0';
    document.getElementById('finalResultDisplay').textContent = '0';
    document.getElementById('actualReceivedToday').textContent = '0';
    document.getElementById('amount').focus();
  }

  function formatNumber(num) {
    return Math.round(num).toLocaleString(); // ปัดเศษและไม่แสดงทศนิยม
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  function copyResult() {
    const resultText = document.getElementById('finalResultDisplay').textContent;
    navigator.clipboard.writeText(resultText).then(() => {
      showToast('คัดลอกผลลัพธ์แล้ว!');
    }).catch(err => {
      console.error('Failed to copy: ', err);
      showToast('คัดลอกไม่สำเร็จ');
    });
  }

  // History functions
  const MAX_HISTORY = 20;

  function loadHistory() {
    const historyList = document.getElementById('historyList');
    historyList.innerHTML = '';
    const history = JSON.parse(localStorage.getItem('percentageHistory')) || [];
    history.forEach(item => addHistoryItemToDOM(item, false));
  }

  function saveToHistory(payload, todayReceived, pendingNet) {
    const history = JSON.parse(localStorage.getItem('percentageHistory')) || [];
    const newItem = {
      timestamp: new Date().toLocaleString('th-TH'),
      amount: payload.amount,
      deductPercent: payload.percent,
      receivePercent: payload.receivePercent,
      pendingPercent: payload.pendingPercent,
      todayReceived: todayReceived,
      pendingNet: pendingNet,
      note: payload.note
    };
    history.unshift(newItem); // Add to the beginning
    if (history.length > MAX_HISTORY) {
      history.pop(); // Remove oldest if over limit
    }
    localStorage.setItem('percentageHistory', JSON.stringify(history));
    addHistoryItemToDOM(newItem, true); // Add to DOM immediately
  }

  function addHistoryItemToDOM(item, prepend = true) {
    const historyList = document.getElementById('historyList');
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-header">
        <span>${item.timestamp}</span>
        <span>${item.note}</span>
      </div>
      <div class="history-details">
        ยอดรวม: ${formatNumber(item.amount)} | ได้วันนี้: ${formatNumber(item.todayReceived)} | หลังรอโอน: ${formatNumber(item.pendingNet)}
      </div>
    `;
    div.onclick = () => loadHistoryItem(item);
    if (prepend) {
      historyList.prepend(div);
      if (historyList.children.length > MAX_HISTORY) {
        historyList.lastChild.remove();
      }
    } else {
      historyList.appendChild(div);
    }
  }

  function loadHistoryItem(item) {
    document.getElementById('amount').value = item.amount;
    document.getElementById('deductPercent').value = item.deductPercent;
    document.getElementById('receivePercent').value = item.receivePercent;
    document.getElementById('pendingPercent').value = item.pendingPercent;
    calculateAndSave();
  }

  function clearHistory() {
    if (confirm('คุณต้องการล้างประวัติการคำนวณทั้งหมดใช่หรือไม่?')) {
      localStorage.removeItem('percentageHistory');
      loadHistory();
      showToast('ล้างประวัติแล้ว');
    }
  }

  async function loadDailySummary() {
    if (!API_URL) return;
    try {
      const response = await fetch(API_URL + '?action=getSummary', { mode: 'cors' });
      const json = await response.json();
      if (json.status === 'success' && json.data) {
        const today = new Date().toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const todayData = json.data.find(item => {
          const itemDate = new Date(item.date).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit', year: 'numeric' });
          return itemDate === today;
        });

        let actualReceivedToday = 0;
        if (todayData) {
          actualReceivedToday = Math.round(todayData.todayReceived - todayData.pendingNet);
        }
        document.getElementById('actualReceivedToday').textContent = formatNumber(actualReceivedToday);
      }
    } catch (error) {
      console.error('Error loading daily summary:', error);
      // showToast('โหลดสรุปยอดวันนี้ไม่สำเร็จ'); // Suppress toast for this for cleaner UI
    }
  }
</script>
</body>
</html>
