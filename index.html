<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เครื่องคิดเปอร์เซ็นต์ PRO</title>

<style>
body{
font-family:sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:16px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h2{text-align:center;margin-bottom:20px;}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#4a7cff;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
}

.copy-btn{
background:#28a745;
}

.result{
margin-top:15px;
padding:15px;
background:#f7f7f7;
border-radius:12px;
line-height:1.7;
font-size:14px;
}

.summary{
margin-top:10px;
padding:12px;
background:#eaf1ff;
border-radius:10px;
font-weight:bold;
text-align:center;
font-size:18px;
}

.success{
color:green;
margin-top:10px;
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>📊 เครื่องคิดเปอร์เซ็นต์</h2>

<input id="amount" placeholder="ยอดเงิน เช่น 1000+500">
<input id="percent" placeholder="หัก (%)">
<input id="receivePercent" placeholder="เราได้ (%)">
<input id="pendingPercent" placeholder="% รอร้านโอนกลับ">

<button onclick="calculate()">คำนวณ + บันทึก</button>
<button class="copy-btn" onclick="copyResult()">📋 Copy ส่งลูกค้า</button>

<div class="result" id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";

let lastText = "";

async function calculate(){

const amountInput = document.getElementById("amount").value;
const percent = parseFloat(document.getElementById("percent").value)||0;
const receivePercent = parseFloat(document.getElementById("receivePercent").value)||0;
const pendingPercent = parseFloat(document.getElementById("pendingPercent").value)||0;

const resultDiv = document.getElementById("result");

try{

const amount = Function('"use strict";return ('+amountInput+')')();
if(isNaN(amount)) throw "error";

// 🔹 คำนวณหลัก
const discount = (amount * percent) / 100;
const netAfterDiscount = amount - discount;

const receive = (amount * receivePercent) / 100;

// 🔹 รอโอน (แยกคิดจากยอดเต็ม)
const pendingNet = amount - (amount * pendingPercent) / 100;

// 🔹 summary (โชว์ลูกค้า)
const summary = `${amount.toLocaleString()} - ${percent}% = ${netAfterDiscount.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;

// 🔹 รอโอน summary
const pendingSummary = `${amount.toLocaleString()} - ${pendingPercent}% = ${pendingNet.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;

// 🔹 copy (เอาแค่บรรทัดเดียว)
lastText = summary;

// 🔹 แสดงผล
resultDiv.innerHTML = `
<div>ยอดรวม: <b>${amount.toLocaleString()}</b></div>

<div style="color:red;">
หัก ${percent}% : -${discount.toLocaleString()}
</div>

<div>หลังหัก: <b>${netAfterDiscount.toLocaleString()}</b></div>

<div style="color:green;">
เราได้ ${receivePercent}% : ${receive.toLocaleString()}
</div>

<div style="color:orange;">
รอโอน: <b>${pendingSummary}</b>
</div>

<div class="summary">${summary}</div>

<div class="success">✅ บันทึกข้อมูลแล้ว</div>
`;

// 🔥 ส่งเข้า Google Sheet
fetch(API_URL,{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
amount,
percent,
receivePercent,
pendingPercent,
discount,
receiveAmount:receive,
pendingNet,
final:netAfterDiscount
})
});

}catch{
resultDiv.innerHTML="❌ ใส่ตัวเลขไม่ถูกต้อง";
}

}

// 📋 copy
function copyResult(){
if(!lastText) return alert("ยังไม่มีข้อมูล");
navigator.clipboard.writeText(lastText);
alert("คัดลอกแล้ว!");
}

</script>

</body>
</html>
