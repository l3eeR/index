<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>คิดเปอร์เซ็นต์ PRO v5 (FINAL)</title>
  <style>
    :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
    .container { max-width: 480px; margin: 15px auto; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 22px; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #555; }
    input { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; font-size: 17px; box-sizing: border-box; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--accent); background: #f9f9f9; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-calc { background: var(--success); color: white; margin-top: 10px; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
    .btn-calc:active { transform: scale(0.97); }

    .result-box { background: #fdfdfd; padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #f0f0f0; }
    .res-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 16px; }
    .hr { border-top: 1px dashed #ddd; margin: 10px 0; }
    
    .net-display { text-align: center; margin: 15px 0; }
    .net-label { font-size: 14px; color: #7f8c8d; }
    .net-value { font-size: 32px; color: var(--success); font-weight: bold; display: block; }
    
    .copy-section { display: flex; align-items: center; background: #eef7ff; padding: 12px; border-radius: 10px; gap: 10px; margin-top: 10px; border: 1px solid #d6eaff; }
    #copyTarget { flex: 1; font-weight: bold; color: var(--accent); font-size: 18px; text-align: center; }
    .btn-copy { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📊 ระบบคิดเงิน & จดบันทึก</h2>
    
    <div class="form-group">
      <label>ยอดเงิน (รองรับ 1000+500)</label>
      <input type="text" id="amount" placeholder="ใส่ยอดเงินที่นี่" inputmode="decimal">
    </div>

    <div class="grid">
      <div class="form-group">
        <label>หักออก (%)</label>
        <input type="number" id="p_deduct" value="10">
      </div>
      <div class="form-group">
        <label>รับคืน (%)</label>
        <input type="number" id="p_receive" value="10">
      </div>
    </div>

    <div class="form-group">
      <label>% ที่ร้านยังไม่โอน (รอโอน)</label>
      <input type="number" id="p_pending" value="0">
    </div>

    <button class="btn btn-calc" id="saveBtn" onclick="process()">คำนวณและบันทึกข้อมูล</button>

    <div class="result-box">
      <div class="res-row"><span>ยอดเงินต้น:</span> <span id="v_amt">0</span></div>
      <div class="res-row" style="color:var(--danger)"><span>หักออก (%):</span> <span id="v_deduct">0</span></div>
      <div class="res-row" style="color:var(--success)"><span>รับคืน (%):</span> <span id="v_receive">0</span></div>
      
      <div class="hr"></div>
      
      <div class="net-display">
        <span class="net-label">เราได้สุทธิวันนี้</span>
        <span class="net-value" id="v_net">0</span>
      </div>

      <div class="hr"></div>
      <div class="res-row" style="color:orange"><span>รอร้านโอนกลับ:</span> <span id="v_pending">0</span></div>
      
      <div class="copy-section">
        <span id="copyTarget">0</span>
        <button class="btn-copy" onclick="copyValue()">คัดลอก</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ** สำคัญ: นำ URL จาก Apps Script มาวางตรงนี้ **
  const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";

  function process() {
    const btn = document.getElementById('saveBtn');
    const rawInput = document.getElementById('amount').value;
    
    try {
      // รองรับการบวกเลขในช่อง input
      let amt = eval(rawInput.replace(/[^0-9+\-*/.]/g, ''));
      let pDeduct = Number(document.getElementById('p_deduct').value);
      let pReceive = Number(document.getElementById('p_receive').value);
      let pPending = Number(document.getElementById('p_pending').value);

      // สูตรคำนวณตามที่ต้องการ
      let valDeduct = Math.round(amt * (pDeduct / 100));
      let valReceive = Math.round(amt * (pReceive / 100));
      let netToday = Math.round(amt - valDeduct + valReceive); // ยอด "เราได้วันนี้"
      let valPending = Math.round(amt * (pPending / 100));
      let finalRemain = netToday - valPending;

      // แสดงผลบนหน้าจอ
      document.getElementById('v_amt').innerText = amt.toLocaleString();
      document.getElementById('v_deduct').innerText = "-" + valDeduct.toLocaleString();
      document.getElementById('v_receive').innerText = "+" + valReceive.toLocaleString();
      document.getElementById('v_net').innerText = netToday.toLocaleString();
      document.getElementById('v_pending').innerText = valPending.toLocaleString();
      document.getElementById('copyTarget').innerText = netToday.toLocaleString();

      // บันทึกข้อมูลไปที่ Google Sheet
      btn.disabled = true; 
      btn.innerText = "กำลังบันทึกข้อมูล...";

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          amount: amt, 
          percent: pDeduct, 
          receivePercent: pReceive,
          pendingPercent: pPending, 
          todayNet: netToday, // เราได้วันนี้
          pendingAmt: valPending, 
          finalRemain: finalRemain
        })
      }).then(() => {
        alert("บันทึกข้อมูลเรียบร้อย!");
      }).catch(err => alert("เกิดข้อผิดพลาด: " + err))
      .finally(() => { 
        btn.disabled = false; 
        btn.innerText = "คำนวณและบันทึกข้อมูล"; 
      });

    } catch(e) {
      alert("กรุณาใส่ตัวเลขให้ถูกต้องครับ");
    }
  }

  function copyValue() {
    const text = document.getElementById('copyTarget').innerText.replace(/,/g, '');
    navigator.clipboard.writeText(text);
    alert("คัดลอกยอด " + text + " เรียบร้อย!");
  }
</script>
</body>
</html>
