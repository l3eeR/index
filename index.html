<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบคำนวณกำไร & ยอดโอนลูกค้า</title>
  <style>
    :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f8f9fa; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
    .container { max-width: 450px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 20px; }
    
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #666; }
    input { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; font-size: 18px; box-sizing: border-box; transition: 0.3s; }
    input:focus { border-color: var(--accent); outline: none; background: #fff; }
    
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .btn-main { width: 100%; padding: 18px; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; background: var(--accent); color: white; margin-top: 15px; transition: 0.2s; }
    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled { background: #ccc; }

    .result-section { background: #fdfdfd; padding: 20px; border-radius: 18px; margin-top: 20px; border: 1px solid #f0f0f0; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
    .profit-box { text-align: center; margin: 15px 0; padding: 15px; background: #f0fff4; border-radius: 12px; border: 1px solid #c6f6d5; }
    .profit-label { font-size: 14px; color: #27ae60; font-weight: bold; }
    .profit-value { font-size: 32px; color: #1e8449; font-weight: bold; display: block; }

    .copy-box { display: flex; align-items: center; background: #eef7ff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #d6eaff; }
    #copyTarget { flex: 1; font-weight: bold; color: var(--accent); font-size: 18px; text-align: center; }
    .btn-copy { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-left: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🏦 ระบบคิดเงิน & บันทึกกำไร</h2>
    
    <div class="form-group">
      <label>ยอดเงินต้น (เช่น 1180 หรือ 1000+180)</label>
      <input type="text" id="amount" placeholder="ใส่ยอดเงินที่นี่" inputmode="decimal">
    </div>

    <div class="grid">
      <div class="form-group">
        <label>หักลูกค้า (%)</label>
        <input type="number" id="p_cust" value="25">
      </div>
      <div class="form-group">
        <label>ร้านหักเรา (%)</label>
        <input type="number" id="p_shop" value="15">
      </div>
    </div>

    <button class="btn-main" id="saveBtn" onclick="calculateAndSave()">คำนวณและบันทึก</button>

    <div class="result-section">
      <div class="row"><span>หักลูกค้า:</span> <span id="v_cust_val" style="color:var(--danger)">0</span></div>
      <div class="row"><span>ร้านหักเรา:</span> <span id="v_shop_val">0</span></div>
      
      <div class="profit-box">
        <span class="profit-label">กำไรสุทธิที่เราได้จริง</span>
        <span class="profit-value" id="v_my_profit">0</span>
      </div>

      <div class="row" style="border:none"><span>ยอดโอนให้ลูกค้า:</span></div>
      <div class="copy-box">
        <span id="copyTarget">---</span>
        <button class="btn-copy" onclick="copyResult()">คัดลอก</button>
      </div>
    </div>
  </div>
</div>

<script>
  // บันทึก URL จาก Google Apps Script ที่นี่
  const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";

  function calculateAndSave() {
    const btn = document.getElementById('saveBtn');
    const rawInput = document.getElementById('amount').value;

    try {
      // 1. คำนวณค่า
      let amt = eval(rawInput.replace(/[^0-9+\-*/.]/g, ''));
      let pCust = Number(document.getElementById('p_cust').value);
      let pShop = Number(document.getElementById('p_shop').value);

      // ยอดหักลูกค้า
      let valCustDeduct = Math.round(amt * (pCust / 100));
      let toCustomer = amt - valCustDeduct;

      // ยอดกำไรเรา (หักลูกค้า - ร้านหักเรา)
      let pProfit = pCust - pShop;
      let valProfit = Math.round(amt * (pProfit / 100));

      // 2. แสดงผลหน้าเว็บ
      document.getElementById('v_cust_val').innerText = "-" + valCustDeduct.toLocaleString();
      document.getElementById('v_shop_val').innerText = (pShop) + "%";
      document.getElementById('v_my_profit').innerText = valProfit.toLocaleString() + " บาท";
      
      const copyStr = `${amt}-${pCust}%=${toCustomer}`;
      document.getElementById('copyTarget').innerText = copyStr;

      // 3. ส่งข้อมูลไป Google Sheet
      btn.disabled = true;
      btn.innerText = "กำลังบันทึก...";

      fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          amount: amt,
          customerDeduct: pCust,
          shopDeduct: pShop,
          profitAmt: valProfit,
          toCustomer: toCustomer,
          note: copyStr
        })
      }).then(() => {
        alert("บันทึกเรียบร้อย!");
      }).catch(err => alert("Error: " + err))
      .finally(() => {
        btn.disabled = false;
        btn.innerText = "คำนวณและบันทึก";
      });

    } catch(e) {
      alert("กรุณากรอกตัวเลขให้ถูกต้อง");
    }
  }

  function copyResult() {
    const text = document.getElementById('copyTarget').innerText;
    if(text === "---") return;
    navigator.clipboard.writeText(text);
    alert("คัดลอกยอดส่งลูกค้า: " + text);
  }
</script>
</body>
</html>
