<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เครื่องคิดเปอร์เซ็นต์ PRO v3</title>
    <style>
        :root { --primary: #4a7cff; --success: #28a745; --orange: #fd7e14; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result-box { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 12px; font-size: 14px; border: 1px solid #eee; }
        .summary-line { background: #eaf1ff; padding: 12px; border-radius: 10px; text-align: center; font-size: 18px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📊 คิดเปอร์เซ็นต์ PRO</h2>
    <div class="input-group">
        <label>ยอดเงิน (เช่น 1000+702)</label>
        <input id="amount" type="text" placeholder="0.00">
    </div>
    <div class="input-group">
        <label>เลือกประเภทรายการ</label>
        <select id="typeSelect" onchange="applyConfig()">
            <option value="">-- กำหนดเอง --</option>
        </select>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>หักออก (%)</label>
            <input id="percent" type="number" value="0">
        </div>
        <div class="input-group">
            <label>รับคืน (%)</label>
            <input id="receivePercent" type="number" value="0">
        </div>
    </div>
    <div class="input-group">
        <label>% รอร้านโอนกลับ</label>
        <input id="pendingPercent" type="number" value="0">
    </div>

    <button class="btn-calc" onclick="calculate()">คำนวณและบันทึก</button>

    <div id="resultBox" class="result-box" style="display:none;"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby3T07pNcYTTKKulTeQ0wUATjOc_3Y5nd0P68ZYft-keLonW4nB6K6uLXIfya0JkXk/exec";
let configData = [];

// โหลดข้อมูลจากหน้า Config
window.onload = async () => {
    try {
        const res = await fetch(API_URL);
        configData = await res.json();
        const select = document.getElementById("typeSelect");
        configData.forEach((item, index) => {
            let opt = new Option(item.name, index);
            select.add(opt);
        });
    } catch(e) { console.log("Load config failed"); }
};

function applyConfig() {
    const idx = document.getElementById("typeSelect").value;
    if (idx !== "") {
        document.getElementById("percent").value = configData[idx].percent;
        document.getElementById("receivePercent").value = configData[idx].receive;
    }
}

async function calculate() {
    const amountStr = document.getElementById("amount").value;
    const p = parseFloat(document.getElementById("percent").value) || 0;
    const rp = parseFloat(document.getElementById("receivePercent").value) || 0;
    const pp = parseFloat(document.getElementById("pendingPercent").value) || 0;

    try {
        const amount = Function('"use strict"; return (' + amountStr + ')')();
        
        // --- ส่วนที่ปรับปรุงใหม่ให้ตรงตามโจทย์ ---
        const discount = (amount * p) / 100;
        const netAfterDiscount = amount - discount;
        const receiveAmt = (amount * rp) / 100;
        
        // ยอดรอโอน: ยอดเต็ม - %รอโอน (เช่น 1702 - 8% = 1565.84)
        const pendingNet = amount - (amount * pp / 100); 

        const resBox = document.getElementById("resultBox");
        resBox.style.display = "block";
        resBox.innerHTML = `
            <div style="display:flex; justify-content:space-between"><span>ยอดรวม:</span><b>${amount.toLocaleString()}</b></div>
            <div style="display:flex; justify-content:space-between; color:red"><span>หัก ${p}%:</span><b>-${discount.toLocaleString(undefined,{minimumFractionDigits:2})}</b></div>
            <div style="display:flex; justify-content:space-between; color:green"><span>รับคืน ${rp}%:</span><b>${receiveAmt.toLocaleString(undefined,{minimumFractionDigits:2})}</b></div>
            <div style="display:flex; justify-content:space-between; color:orange; margin-top:5px; border-top:1px dashed #ccc; padding-top:5px;">
                <span>ยอดหลังหักรอโอน (${pp}%):</span><b>${pendingNet.toLocaleString(undefined,{minimumFractionDigits:2})}</b>
            </div>
            <div class="summary-line">${amount.toLocaleString()} - ${p}% = ${netAfterDiscount.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
        `;

        // บันทึกข้อมูล
        fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                amount, percent: p, receivePercent: rp, pendingPercent: pp,
                final: netAfterDiscount, pendingNet: pendingNet, receiveAmount: receiveAmt
            })
        });
    } catch(e) { alert("กรุณากรอกตัวเลขให้ถูกต้อง"); }
}
</script>
</body>
</html>
